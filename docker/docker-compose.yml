# VecheMoga full local stack: Postgres + the Spring API + the Next.js web app + a
# proxy-mock for the API's outbound providers, all in containers. This is the umbrella
# that ties the sibling app repos together (the analog of Sesame's
# Local-Development/backend-docker) - the app Dockerfiles live in their own repos
# (../../VecheMogaApi, ../../VecheMogaWeb), this file only composes them.
#
# It is automation-ready by default: the API's `local` profile already seeds the
# admin (admin@vechemoga.bg / admin) and the provider-proxy captures outgoing email, so
# the VecheMogaAutomation suite runs against `./run.sh up` with no extra mode.
#
# Drive it with ./run.sh (interactive menu or ./run.sh up|infra|no-api|no-web|...).
#
# Ports on the host: web 3000, api 8080, postgres 5432, provider-proxy 1080 - these match
# VecheMogaAutomation's .env defaults, so the suite runs against this stack unchanged.
name: vechemoga-local

services:
  # Mirrors VecheMogaApi/compose.yaml (same image, creds, healthcheck) so the API's
  # `local` Spring profile reaches it at postgres:5432. Its own volume, independent
  # of the vechemoga-api project's.
  postgres:
    image: 'postgres:17'
    environment:
      - 'POSTGRES_DB=${POSTGRES_DB:-vechemoga}'
      - 'POSTGRES_USER=${POSTGRES_USER:-vechemoga}'
      - 'POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-vechemoga}'
      - 'TZ=UTC'
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - 'pgdata:/var/lib/postgresql/data'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-vechemoga} -d ${POSTGRES_DB:-vechemoga}']
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  # The Spring API, built from its own repo's Dockerfile. Everything it needs is in the
  # `local` profile (application-local.yml): the datasource at postgres:5432, the seeded
  # admin (admin@vechemoga.bg / admin), transactional email and ESP both ON, and both Loops
  # base-urls pointed at http://provider-proxy:1080. That profile describes exactly this
  # stack, so there is nothing to override from here - the provider-proxy service below is
  # what makes turning the providers on safe. The profile is all this sets: JAVA_OPTS is the
  # image's own (-XX:MaxRAMPercentage=75, expanded by its `java $JAVA_OPTS -jar` entrypoint),
  # and repeating it here would only be a second place to change the heap.
  api:
    build:
      context: ../../VecheMogaApi
      dockerfile: Dockerfile
    image: 'vechemoga-api:local'
    environment:
      - 'SPRING_PROFILES_ACTIVE=local'
    ports:
      - '${API_PORT:-8080}:8080'
    depends_on:
      postgres:
        condition: service_healthy
      provider-proxy:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ['CMD-SHELL', 'curl -fsS http://localhost:8080/actuator/health | grep -q ''"status":"UP"''']
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 40s

  # First-party, zero-dependency provider proxy-mock (Node's http only), owned by this repo
  # (../provider-proxy - see its README for the control plane). It stands in for the API's
  # outbound HTTP providers (Loops, for both transactional email and ESP contact sync) for
  # the whole stack, tests or not: a client registers an expectation keyed on the recipient
  # email via the control plane at http://localhost:1080/__proxy/* and reads the verification
  # link back out of the journal (GET /__proxy/requests).
  #
  # PROXY_UPSTREAM_URL is deliberately EMPTY by default, and that is what makes it safe for
  # the `local` profile to run the REAL Loops clients against this: with no upstream, there
  # is no path from here to a real inbox - unmatched traffic is stubbed 200 and journaled
  # rather than forwarded. That also makes the ESP poller, which registers no expectation for
  # its 60s sweep, a clean no-op instead of a pile of failures.
  # Set it in .env (see ../.env.example) to https://app.loops.so/api to opt into passthrough.
  # Mounted read-only: the script needs no install, so the stock node image runs it as-is
  # (../provider-proxy/Dockerfile exists for deploying it elsewhere, and is unused here).
  provider-proxy:
    # Same digest as ../provider-proxy/Dockerfile, so the proxy you run here and the proxy
    # built from that file are the same Node. Refresh both together:
    #   docker buildx imagetools inspect node:20-alpine
    image: 'node:20-alpine@sha256:fb4cd12c85ee03686f6af5362a0b0d56d50c58a04632e6c0fb8363f609372293'
    working_dir: /app
    command: ['node', 'provider-proxy.mjs']
    volumes:
      - '../provider-proxy/provider-proxy.mjs:/app/provider-proxy.mjs:ro'
    environment:
      - 'PROXY_UPSTREAM_URL=${PROXY_UPSTREAM_URL:-}'
    ports:
      # Inside the container the proxy always listens on its default 1080 (no PROXY_PORT is
      # passed in), so PROXY_PORT here only remaps the HOST side - one name, one meaning.
      - '${PROXY_PORT:-1080}:1080'
    healthcheck:
      test: ['CMD-SHELL', 'wget -q --spider http://localhost:1080/__proxy/health || exit 1']
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 5s

  # The Next.js app, built from its own repo's Dockerfile (runs `next dev` with the
  # env.local profile). No depends_on: the web app starts independently and tolerates
  # the API not being ready yet, which keeps the `no-api` subset (web only, API from
  # the IDE) working.
  #
  # The browser never talks to the API directly here: env.local leaves the public base
  # URL empty, so client calls go same-origin to /api/* on whichever host the page is
  # on (localhost / admin.localhost / kid.localhost) and Next proxies them to
  # API_INTERNAL_BASE_URL. That is what lets the admin/kid subdomains authenticate -
  # each *.localhost is its own site, so a direct call to localhost:8080 would be
  # cross-site and the API's SameSite=Lax cookies would be dropped. Server-side render
  # uses the same origin.
  web:
    build:
      context: ../../VecheMogaWeb
      dockerfile: Dockerfile
    image: 'vechemoga-web:local'
    environment:
      # Server-side (SSR) API origin. Defaults to the api service on the compose
      # network; run.sh's `no-api` subset overrides it to host.docker.internal so a
      # containerised web can reach an API you run from the IDE on the host.
      - 'API_INTERNAL_BASE_URL=${API_INTERNAL_BASE_URL:-http://api:8080}'
    extra_hosts:
      # Linux parity: Docker Desktop (mac/win) resolves host.docker.internal already.
      - 'host.docker.internal:host-gateway'
    ports:
      - '${WEB_PORT:-3000}:3000'
    restart: unless-stopped
    healthcheck:
      # "Healthy" = the dev server answers with ANY HTTP status. The apex homepage
      # 500s until a CMS home page is published (fresh DB), so a status-strict probe
      # would wrongly mark the app down - node exits 0 on any response, 1 only on a
      # connection error. node is always present in the image.
      test:
        - 'CMD'
        - 'node'
        - '-e'
        - "require('http').get('http://localhost:3000/',r=>process.exit(0)).on('error',()=>process.exit(1))"
      interval: 10s
      timeout: 10s
      retries: 18
      start_period: 90s

volumes:
  pgdata:
    driver: local
