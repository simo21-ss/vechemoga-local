name: vechemoga-local

services:
  postgres:
    image: 'postgres:17'
    environment:
      - 'POSTGRES_DB=${POSTGRES_DB:-vechemoga}'
      - 'POSTGRES_USER=${POSTGRES_USER:-vechemoga}'
      - 'POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-vechemoga}'
      - 'TZ=UTC'
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - 'pgdata:/var/lib/postgresql/data'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-vechemoga} -d ${POSTGRES_DB:-vechemoga}']
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  # The `local` profile (application-local.yml) already describes this stack - datasource,
  # seeded admin, and every provider base-url pointed at provider-proxy:1080. Add overrides
  # there, not here, so the stack has one description rather than two that can disagree.
  api:
    build:
      context: ../../VecheMogaApi
      dockerfile: Dockerfile
    image: 'vechemoga-api:local'
    environment:
      - 'SPRING_PROFILES_ACTIVE=local'
    ports:
      - '${API_PORT:-8080}:8080'
    depends_on:
      postgres:
        condition: service_healthy
      provider-proxy:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ['CMD-SHELL', 'curl -fsS http://localhost:8080/actuator/health | grep -q ''"status":"UP"''']
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 40s

  # Stock WireMock + mapping JSON, owned by github.com/simo21-ss/vechemoga-provider-proxy.
  # One process fronts Loops and Stripe; it fails closed and has no egress.
  provider-proxy:
    # Never :latest - that tag is deliberately not moved and still resolves to the retired
    # Node proxy. Bump this pin when the proxy repo releases.
    image: '${PROVIDER_PROXY_IMAGE:-776051122865.dkr.ecr.eu-central-1.amazonaws.com/vechemoga/provider-proxy}:${PROVIDER_PROXY_TAG:-b52518d089bf}'
    ports:
      # Loopback only: the Admin API is unauthenticated and can read captured request bodies.
      # The API reaches the container over the compose network, so this affects host access
      # only - PROXY_PORT remaps the host side, WireMock always listens on 1080 inside.
      - '127.0.0.1:${PROXY_PORT:-1080}:1080'
    deploy:
      resources:
        limits:
          memory: 768m
    # No healthcheck block: the image ships its own on /__admin/health, which is what api's
    # `depends_on: service_healthy` consumes.

  # No depends_on: the web tolerates the API not being up, which keeps `no-api` working.
  web:
    build:
      context: ../../VecheMogaWeb
      dockerfile: Dockerfile
    image: 'vechemoga-web:local'
    environment:
      # SSR-only API origin. env.local leaves the PUBLIC base url empty on purpose, so browser
      # calls go same-origin to /api/* and Next proxies them here - that is what lets the
      # admin./kid.localhost subdomains authenticate, since a direct call to localhost:8080
      # would be cross-site and the API's SameSite=Lax cookies would be dropped.
      # run.sh's `no-api` overrides this to host.docker.internal for an IDE-run API.
      - 'API_INTERNAL_BASE_URL=${API_INTERNAL_BASE_URL:-http://api:8080}'
    extra_hosts:
      # Linux parity: Docker Desktop resolves host.docker.internal already.
      - 'host.docker.internal:host-gateway'
    ports:
      - '${WEB_PORT:-3000}:3000'
    restart: unless-stopped
    healthcheck:
      # Any HTTP status counts: the apex homepage 500s until a CMS home page exists, so a
      # status-strict probe would wrongly mark a fresh stack down.
      test:
        - 'CMD'
        - 'node'
        - '-e'
        - "require('http').get('http://localhost:3000/',r=>process.exit(0)).on('error',()=>process.exit(1))"
      interval: 10s
      timeout: 10s
      retries: 18
      start_period: 90s

volumes:
  pgdata:
    driver: local
